<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FundIt - Crowdfunding Platform</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="navbar">
    <a href="/" class="logo">Fund<span>It</span></a>
    <nav id="navbar"></nav>
  </header>

  <section class="hero">
    <h1>Bring Your Ideas to Life</h1>
    <p>Discover creative projects and help fund the next big thing. Join our community of creators and backers.</p>
    <a href="register.html" class="btn btn-outline" style="color:white;border-color:white;">Get Started</a>
  </section>

  <section class="search-section">
    <input type="text" id="searchInput" placeholder="Search campaigns...">
    <select id="categoryFilter">
      <option value="">All Categories</option>
      <option value="technology">Technology</option>
      <option value="music">Music</option>
      <option value="community">Community</option>
      <option value="film">Film</option>
      <option value="art">Art</option>
      <option value="education">Education</option>
      <option value="health">Health</option>
      <option value="gaming">Gaming</option>
    </select>
    <select id="sortFilter">
      <option value="">Sort By</option>
      <option value="deadline">Deadline</option>
      <option value="goal">Goal Amount</option>
    </select>
  </section>

  <div class="campaigns-grid" id="campaignsGrid">
    <!-- campaigns loaded here -->
  </div>

  <footer>
    <p>&copy; 2026 FundIt. All rights reserved.</p>
  </footer>

  <script src="js/utils.js"></script>
  <script src="js/home.js"></script>
</body>

</html>
